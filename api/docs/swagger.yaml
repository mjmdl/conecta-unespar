definitions:
  main.LoginDto:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  main.LogupDto:
    properties:
      name:
        type: string
      password:
        type: string
      username:
        type: string
    required:
    - name
    - password
    - username
    type: object
  main.ProfileResultDto:
    properties:
      id:
        type: string
      name:
        type: string
    type: object
info:
  contact: {}
paths:
  /login:
    post:
      description: Generates the access-token cookie.
      parameters:
      - description: Authentication payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/main.LoginDto'
      responses:
        "204":
          description: No Content
      summary: Authenticate
  /logout:
    post:
      responses:
        "204":
          description: No Content
      summary: Commit unalive
  /logup:
    post:
      parameters:
      - description: Account data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/main.LogupDto'
      responses:
        "204":
          description: No Content
      summary: Create account
  /me:
    get:
      responses:
        "200":
          description: Current user profile
          schema:
            $ref: '#/definitions/main.ProfileResultDto'
      summary: See current user
  /profile-picture:
    delete:
      responses:
        "204":
          description: No Content
      summary: Remove profile picture
    get:
      responses:
        "200":
          description: OK
      summary: Retrieve profile picture
    put:
      consumes:
      - multipart/form-data
      parameters:
      - description: Profile picture
        in: formData
        name: picture
        required: true
        type: file
      responses:
        "204":
          description: No Content
      summary: Update profile picture
securityDefinitions:
  CookieAuth:
    in: cookie
    name: access-token
    type: apiKey
swagger: "2.0"
