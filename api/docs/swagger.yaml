definitions:
  main.ChatsPageDto:
    properties:
      chats:
        items:
          properties:
            directInfo:
              description: Present only for direct chats.
              properties:
                himBlockedYou:
                  type: boolean
                id:
                  type: string
                name:
                  type: string
                youBlockedHim:
                  type: boolean
              type: object
            groupInfo:
              description: Present only for group chats.
              properties:
                name:
                  type: string
                youAreAdmin:
                  type: boolean
                youAreOwner:
                  type: boolean
              type: object
            id:
              type: string
            isMuted:
              type: boolean
            isPinned:
              type: boolean
            lastPost:
              properties:
                fileCount:
                  type: integer
                id:
                  type: string
                message:
                  type: string
                postedAt:
                  type: string
                poster:
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                  type: object
              type: object
            pictureId:
              type: string
            validFrom:
              type: string
          type: object
        type: array
      counted:
        type: integer
      skipped:
        type: integer
      taken:
        type: integer
    type: object
  main.CreateChatResultDto:
    properties:
      chatId:
        type: string
    type: object
  main.CreatePostResultDto:
    properties:
      postId:
        type: string
    type: object
  main.LoginDto:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  main.LogupDto:
    properties:
      name:
        type: string
      password:
        type: string
      username:
        type: string
    required:
    - name
    - password
    - username
    type: object
  main.ProfileResultDto:
    properties:
      id:
        type: string
      name:
        type: string
      pictureId:
        type: string
    type: object
  main.UpdateDirectChatDto:
    properties:
      doBlock:
        type: boolean
      doFriend:
        type: boolean
      doMute:
        type: boolean
      doPin:
        type: boolean
      otherAccountId:
        type: string
    required:
    - otherAccountId
    type: object
info:
  contact: {}
paths:
  /attach/{id}:
    get:
      parameters:
      - description: Attachment ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
      summary: Retrieve attachment file
      tags:
      - Attachments
  /chat:
    get:
      parameters:
      - default: 0
        description: Number of chats to skip.
        in: query
        name: skip
        type: integer
      - default: 9
        description: Number of chats to take.
        in: query
        name: take
        type: integer
      responses:
        "200":
          description: Current user profile
          schema:
            $ref: '#/definitions/main.ChatsPageDto'
      summary: List the current user chats
      tags:
      - Chat
  /direct-chat:
    put:
      parameters:
      - description: Direct chat options.
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/main.UpdateDirectChatDto'
      responses:
        "201":
          description: Direct chat created.
          schema:
            $ref: '#/definitions/main.CreateChatResultDto'
        "204":
          description: Changes applied to direct chat.
      summary: Update direct chat with another user.
      tags:
      - Chat
  /group-chat:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: The name of the group
        in: formData
        name: name
        required: true
        type: string
      - description: The description of the group
        in: formData
        name: description
        type: string
      - collectionFormat: csv
        description: Account IDs of the members
        in: formData
        items:
          type: string
        name: accountIds
        required: true
        type: array
      - description: Group picture
        in: formData
        name: picture
        type: file
      responses:
        "201":
          description: The group is created.
          schema:
            $ref: '#/definitions/main.CreateChatResultDto'
      summary: Create a group chat
      tags:
      - Chat
  /login:
    post:
      description: Generates the access-token cookie.
      parameters:
      - description: Authentication payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/main.LoginDto'
      responses:
        "204":
          description: No Content
      summary: Authenticate
      tags:
      - User
  /logout:
    post:
      responses:
        "204":
          description: No Content
      summary: Commit unalive
      tags:
      - User
  /logup:
    post:
      parameters:
      - description: Account data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/main.LogupDto'
      responses:
        "204":
          description: No Content
      summary: Create account
      tags:
      - User
  /me:
    get:
      responses:
        "200":
          description: Current user profile
          schema:
            $ref: '#/definitions/main.ProfileResultDto'
      summary: See current user
      tags:
      - User
  /post:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: Chat Id
        in: formData
        name: chatId
        required: true
        type: string
      - description: Reply to Post ID
        in: formData
        name: replyToId
        type: string
      - description: Message
        in: formData
        name: message
        type: string
      - collectionFormat: csv
        description: Attachments (multiple files)
        in: formData
        items:
          type: file
        name: attach
        type: array
      responses:
        "201":
          description: The post is posted.
          schema:
            $ref: '#/definitions/main.CreatePostResultDto'
      summary: Send a post in the chat.
      tags:
      - Post
  /profile-picture:
    delete:
      responses:
        "204":
          description: No Content
      summary: Remove profile picture
      tags:
      - User
    put:
      consumes:
      - multipart/form-data
      parameters:
      - description: Profile picture
        in: formData
        name: picture
        required: true
        type: file
      responses:
        "204":
          description: No Content
      summary: Update profile picture
      tags:
      - User
securityDefinitions:
  CookieAuth:
    in: cookie
    name: access-token
    type: apiKey
swagger: "2.0"
