definitions:
  main.CampusPageDto:
    properties:
      campus:
        items:
          properties:
            id:
              type: string
            name:
              type: string
            validFrom:
              type: string
          type: object
        type: array
      counted:
        type: integer
      skipped:
        type: integer
      taken:
        type: integer
    type: object
  main.ChatsPageDto:
    properties:
      chats:
        items:
          properties:
            directInfo:
              description: Present only for direct chats.
              properties:
                himBlockedYou:
                  type: boolean
                id:
                  type: string
                name:
                  type: string
                youBlockedHim:
                  type: boolean
              type: object
            groupInfo:
              description: Present only for group chats.
              properties:
                name:
                  type: string
                youAreAdmin:
                  type: boolean
                youAreOwner:
                  type: boolean
              type: object
            id:
              type: string
            isMuted:
              type: boolean
            isPinned:
              type: boolean
            lastPost:
              properties:
                fileCount:
                  type: integer
                id:
                  type: string
                message:
                  type: string
                postedAt:
                  type: string
                poster:
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                  type: object
              type: object
            pictureId:
              type: string
            validFrom:
              type: string
          type: object
        type: array
      counted:
        type: integer
      skipped:
        type: integer
      taken:
        type: integer
    type: object
  main.CoursesPageDto:
    properties:
      counted:
        type: integer
      courses:
        items:
          properties:
            id:
              type: string
            modality:
              description: 'Either one of those: bachelor, teaching, teaching_2, technology.'
              type: string
            name:
              type: string
            validFrom:
              type: string
          type: object
        type: array
      skipped:
        type: integer
      taken:
        type: integer
    type: object
  main.CreateChatResultDto:
    properties:
      chatId:
        type: string
    type: object
  main.CreatePostResultDto:
    properties:
      postId:
        type: string
    type: object
  main.LoginDto:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  main.LogupDto:
    properties:
      enroll:
        properties:
          campusId:
            type: string
          courseId:
            type: string
        required:
        - campusId
        - courseId
        type: object
      name:
        type: string
      password:
        type: string
      username:
        type: string
    required:
    - name
    - password
    - username
    type: object
  main.MembersPageDto:
    properties:
      counted:
        type: integer
      members:
        items:
          properties:
            account:
              properties:
                id:
                  type: string
                name:
                  type: string
                pictureId:
                  type: string
              type: object
            addedAt:
              type: string
            id:
              type: string
            isAdmin:
              type: boolean
            isOwner:
              type: boolean
            lastPostAt:
              type: string
            removedAt:
              type: string
          type: object
        type: array
      skipped:
        type: integer
      taken:
        type: integer
    type: object
  main.PostsPageDto:
    properties:
      counted:
        type: integer
      posts:
        items:
          properties:
            deletedAt:
              type: string
            id:
              type: string
            memberId:
              type: string
            payload:
              description: The payload is null when deletedAt is not null.
              properties:
                attachIds:
                  items:
                    type: string
                  type: array
                message:
                  type: string
                replyToId:
                  type: string
              type: object
            reactions:
              items:
                properties:
                  emoticon:
                    type: string
                  memberIds:
                    items:
                      type: string
                    type: array
                type: object
              type: array
            receipts:
              items:
                properties:
                  id:
                    type: string
                  memberId:
                    type: string
                  receivedAt:
                    type: string
                  viewedAt:
                    type: string
                type: object
              type: array
            sentAt:
              type: string
          type: object
        type: array
      skipped:
        type: integer
      taken:
        type: integer
    type: object
  main.ProfileResultDto:
    properties:
      id:
        type: string
      name:
        type: string
      pictureId:
        type: string
    type: object
  main.UpdateDirectChatDto:
    properties:
      doBlock:
        type: boolean
      doFriend:
        type: boolean
      doMute:
        type: boolean
      doPin:
        type: boolean
      otherAccountId:
        type: string
    required:
    - otherAccountId
    type: object
  main.UsersPageDto:
    properties:
      counted:
        type: integer
      skipped:
        type: integer
      taken:
        type: integer
      users:
        items:
          properties:
            directInfo:
              properties:
                himBlockedYou:
                  type: boolean
                id:
                  type: string
                isFriend:
                  type: boolean
                isMuted:
                  type: boolean
                isPinned:
                  type: boolean
                youBlockedHim:
                  type: boolean
              type: object
            id:
              type: string
            name:
              type: string
            pictureId:
              type: string
            username:
              type: string
          type: object
        type: array
    type: object
info:
  contact: {}
paths:
  /attach/{id}:
    get:
      parameters:
      - description: Attachment ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
      summary: Retrieve attachment file
      tags:
      - Attachments
  /campus:
    get:
      parameters:
      - default: 0
        description: Number of campus to skip.
        in: query
        name: skip
        type: integer
      - default: 9
        description: Number of campus to take.
        in: query
        name: take
        type: integer
      - description: Query by campus name.
        in: query
        name: query
        type: string
      - description: Filter by course offering.
        in: query
        name: course
        type: string
      responses:
        "200":
          description: Campus page
          schema:
            $ref: '#/definitions/main.CampusPageDto'
      summary: List the campus
      tags:
      - Campus
  /chat:
    get:
      parameters:
      - description: Find chat by ID.
        in: query
        name: id
        type: string
      - default: 0
        description: Number of chats to skip.
        in: query
        name: skip
        type: integer
      - default: 9
        description: Number of chats to take.
        in: query
        name: take
        type: integer
      responses:
        "200":
          description: Current user profile
          schema:
            $ref: '#/definitions/main.ChatsPageDto'
      summary: List the current user chats
      tags:
      - Chat
  /course:
    get:
      parameters:
      - default: 0
        description: Number of courses to skip.
        in: query
        name: skip
        type: integer
      - default: 9
        description: Number of courses to take.
        in: query
        name: take
        type: integer
      - description: Query by course name.
        in: query
        name: query
        type: string
      - description: Filter by campus offering.
        in: query
        name: campus
        type: string
      responses:
        "200":
          description: Courses page
          schema:
            $ref: '#/definitions/main.CoursesPageDto'
      summary: List the courses
      tags:
      - Course
  /direct-chat:
    put:
      parameters:
      - description: Direct chat options.
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/main.UpdateDirectChatDto'
      responses:
        "201":
          description: Direct chat created.
          schema:
            $ref: '#/definitions/main.CreateChatResultDto'
        "204":
          description: Changes applied to direct chat.
      summary: Update direct chat with another user.
      tags:
      - Chat
  /group-chat:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: The name of the group
        in: formData
        name: name
        required: true
        type: string
      - description: The description of the group
        in: formData
        name: description
        type: string
      - collectionFormat: csv
        description: Account IDs of the members
        in: formData
        items:
          type: string
        name: accountIds
        required: true
        type: array
      - description: Group picture
        in: formData
        name: picture
        type: file
      responses:
        "201":
          description: The group is created.
          schema:
            $ref: '#/definitions/main.CreateChatResultDto'
      summary: Create a group chat
      tags:
      - Chat
  /login:
    post:
      description: Generates the access-token cookie.
      parameters:
      - description: Authentication payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/main.LoginDto'
      responses:
        "204":
          description: No Content
      summary: Authenticate
      tags:
      - User
  /logout:
    post:
      responses:
        "204":
          description: No Content
      summary: Commit unalive
      tags:
      - User
  /logup:
    post:
      parameters:
      - description: Account data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/main.LogupDto'
      responses:
        "204":
          description: No Content
      summary: Create account
      tags:
      - User
  /me:
    get:
      responses:
        "200":
          description: Current user profile
          schema:
            $ref: '#/definitions/main.ProfileResultDto'
      summary: See current user
      tags:
      - User
  /member/chat/{chat-id}:
    get:
      parameters:
      - description: Chat ID
        in: path
        name: chat-id
        required: true
        type: string
      - default: 0
        description: Number of members to skip.
        in: query
        name: skip
        type: integer
      - default: 9
        description: Number of members to take.
        in: query
        name: take
        type: integer
      - description: Query by member name.
        in: query
        name: query
        type: string
      responses:
        "200":
          description: Page of members
          schema:
            $ref: '#/definitions/main.MembersPageDto'
      summary: List members in a chat
      tags:
      - Member
  /post:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: Chat Id
        in: formData
        name: chatId
        required: true
        type: string
      - description: Reply to Post ID
        in: formData
        name: replyToId
        type: string
      - description: Message
        in: formData
        name: message
        type: string
      - collectionFormat: csv
        description: Attachments (multiple files)
        in: formData
        items:
          type: file
        name: attach
        type: array
      responses:
        "201":
          description: The post is posted.
          schema:
            $ref: '#/definitions/main.CreatePostResultDto'
      summary: Send a post in the chat.
      tags:
      - Post
  /post/chat/{chat-id}:
    get:
      parameters:
      - description: Chat Id
        in: path
        name: chat-id
        required: true
        type: string
      - default: 0
        description: Number of posts to skip.
        in: query
        name: skip
        type: integer
      - default: 9
        description: Number of posts to take.
        in: query
        name: take
        type: integer
      - description: Query by post message.
        in: query
        name: query
        type: string
      responses:
        "200":
          description: Page of posts
          schema:
            $ref: '#/definitions/main.PostsPageDto'
      summary: List posts in a chat
      tags:
      - Post
  /profile-picture:
    delete:
      responses:
        "204":
          description: No Content
      summary: Remove profile picture
      tags:
      - User
    put:
      consumes:
      - multipart/form-data
      parameters:
      - description: Profile picture
        in: formData
        name: picture
        required: true
        type: file
      responses:
        "204":
          description: No Content
      summary: Update profile picture
      tags:
      - User
  /user:
    get:
      parameters:
      - default: 0
        description: Number of users to skip.
        in: query
        name: skip
        type: integer
      - default: 9
        description: Number of users to take.
        in: query
        name: take
        type: integer
      - description: Query by user name.
        in: query
        name: query
        type: string
      responses:
        "200":
          description: Page of users
          schema:
            $ref: '#/definitions/main.UsersPageDto'
      summary: List users
      tags:
      - User
securityDefinitions:
  CookieAuth:
    in: cookie
    name: access-token
    type: apiKey
swagger: "2.0"
